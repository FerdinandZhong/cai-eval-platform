# CAI Eval Platform — CML Job Chain
#
# Job dependency order:
#   git_sync
#     → setup_eval_env   (install deps, nginx, download datasets)
#
# NOTE: After setup_eval_env completes, launch the CML Application via:
#   - GitHub Actions: .github/workflows/deploy-eval-platform.yml (launch-applications job)
#   - In-project:    python cai_integration/launch_in_project.py
#   - CML UI:        Applications → New Application → script: cai_integration/start_platform.py
# The single co-located Application (start_platform.py) runs Phoenix + FastAPI behind nginx.

jobs:
  git_sync:
    name: "Git Repository Sync"
    script: ".git_sync.py"
    parent_job_key: null
    timeout: 300       # git fetch + reset; should finish in < 2 min
    cpu: 1
    memory: 4
    description: "Pull latest code from GitHub into the CML project"

  setup_eval_env:
    name: "Setup Eval Environment"
    script: "cai_integration/setup_environment.py"
    parent_job_key: "git_sync"
    timeout: 1800      # 30 min: uv venv + eval deps + tau-bench download
    cpu: 4
    memory: 16
    description: "Create /home/cdsw/.venv with eval platform deps, no-root nginx, tau-bench dataset"
