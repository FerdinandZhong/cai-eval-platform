name: Deploy CAI Eval Platform to CML

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild (rerun all jobs)'
        required: false
        default: false
        type: boolean
      skip_env_setup:
        description: 'Skip env setup jobs and go straight to launching applications'
        required: false
        default: false
        type: boolean

jobs:
  setup-project:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      project_id: ${{ steps.setup.outputs.project_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Setup CML Project
        id: setup
        env:
          CML_HOST: ${{ secrets.CML_HOST }}
          CML_API_KEY: ${{ secrets.CML_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Setting up CML project..."
          python cai_integration/setup_project.py
          PROJECT_ID=$(cat /tmp/project_id.txt)
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "Project ID: $PROJECT_ID"

      - name: Create job summary
        if: always()
        run: |
          echo "## Eval Platform Setup: Project" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Project ID**: ${{ steps.setup.outputs.project_id }}" >> $GITHUB_STEP_SUMMARY

  create-jobs:
    needs: setup-project
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Create CML Jobs
        env:
          CML_HOST: ${{ secrets.CML_HOST }}
          CML_API_KEY: ${{ secrets.CML_API_KEY }}
          RUNTIME_IDENTIFIER: ${{ secrets.RUNTIME_IDENTIFIER }}
        run: |
          echo "Creating CML jobs..."
          python cai_integration/create_jobs.py \
            --project-id ${{ needs.setup-project.outputs.project_id }}
          echo "Jobs created"

      - name: Create job summary
        if: always()
        run: |
          echo "## Eval Platform Setup: Jobs" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Project ID**: ${{ needs.setup-project.outputs.project_id }}" >> $GITHUB_STEP_SUMMARY

  trigger-setup-env:
    needs: [setup-project, create-jobs]
    if: ${{ github.event.inputs.skip_env_setup != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Trigger setup_eval_env job chain
        env:
          CML_HOST: ${{ secrets.CML_HOST }}
          CML_API_KEY: ${{ secrets.CML_API_KEY }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
        run: |
          echo "Triggering environment setup jobs (git_sync -> setup_eval_env)..."
          python cai_integration/trigger_jobs.py \
            --project-id ${{ needs.setup-project.outputs.project_id }} \
            --jobs-config cai_integration/jobs_config.yaml
          echo "Environment setup jobs completed"

      - name: Create deployment summary
        if: always()
        run: |
          echo "## Eval Platform: Environment Setup" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Project ID**: ${{ needs.setup-project.outputs.project_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Force Rebuild**: ${{ github.event.inputs.force_rebuild || 'false' }}" >> $GITHUB_STEP_SUMMARY

  launch-applications:
    needs: [setup-project, create-jobs, trigger-setup-env]
    if: |
      always() &&
      needs.setup-project.result == 'success' &&
      needs.create-jobs.result == 'success' &&
      (needs.trigger-setup-env.result == 'success' || needs.trigger-setup-env.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Create / restart CML Application
        env:
          CML_HOST: ${{ secrets.CML_HOST }}
          CML_API_KEY: ${{ secrets.CML_API_KEY }}
          RUNTIME_IDENTIFIER: ${{ secrets.RUNTIME_IDENTIFIER }}
        run: |
          echo "Creating / restarting the co-located CAI Eval Platform application..."
          python cai_integration/create_applications.py \
            --project-id ${{ needs.setup-project.outputs.project_id }}
          echo "Application launched"

      - name: Create application summary
        if: always()
        run: |
          echo "## Eval Platform: Application" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Project ID**: ${{ needs.setup-project.outputs.project_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Application (co-located)" >> $GITHUB_STEP_SUMMARY
          echo "- **CAI Eval Platform**: \`cai_integration/start_platform.py\` (Phoenix + FastAPI behind nginx)" >> $GITHUB_STEP_SUMMARY
          echo "  - Phoenix UI: \`<app-url>/\`" >> $GITHUB_STEP_SUMMARY
          echo "  - Eval API: \`<app-url>/app/\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Backend reaches Phoenix over localhost (\`PHOENIX_BASE_URL\`, default \`http://127.0.0.1:6006\`)." >> $GITHUB_STEP_SUMMARY
          echo "See \`cai_integration/DEPLOY.md\` for in-project / manual launch and standalone-Phoenix mode." >> $GITHUB_STEP_SUMMARY
